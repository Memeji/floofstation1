- type: entity
  name: holymelon
  parent: [FoodProduceBase, ItemHeftyBase]
  id: FoodHolymelon
  description: The water within this melon has been blessed by some deity that's particularly fond of watermelon.
  components:
  - type: Item
    size: Small
  - type: FlavorProfile
    flavors:
      - holy
      - watermelon
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 25
        reagents:
        - ReagentId: Nutriment
          Quantity: 10
        - ReagentId: Vitamin
          Quantity: 5
        - ReagentId: HolyWater # DeltaV - use our holy water
          Quantity: 10
  - type: Sprite
    sprite: Objects/Specific/Hydroponics/holymelon.rsi
  - type: Produce
    seedId: watermelon
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Wine
        Quantity: 20
  - type: Damageable
    damageContainer: Biological
  - type: DamageOnHighSpeedImpact
    minimumSpeed: 0.1
    damage:
      types:
        Blunt: 1
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 1
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: desecration
      - !type:SpillBehavior
        solution: food
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: SliceableFood
    count: 5
    slice: FoodHolymelonSlice
  - type: Tag
    tags:
    - Fruit

