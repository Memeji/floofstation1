- type: entity
  name: glasstle
  parent: FoodProduceBase
  id: FoodGlasstle
  description: A fragile crystal plant with lot of spiky thorns.
  components:
  - type: Item
    size: Small
    sprite: Objects/Specific/Hydroponics/glasstle.rsi
    heldPrefix: produce
  - type: FlavorProfile
    flavors:
      - sharp
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 15
        reagents:
        - ReagentId: Razorium
          Quantity: 15
  - type: Sprite
    sprite: Objects/Specific/Hydroponics/glasstle.rsi
  - type: Produce
    seedId: glasstle
  - type: Extractable
    grindableSolutionName: food
  - type: Damageable
    damageContainer: Inorganic
  - type: ToolRefinable
    refineResult:
    - id: SheetGlass1
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 10
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: GlassBreak
          params:
            volume: -4
      - !type:SpawnEntitiesBehavior
        spawn:
          ShardGlass:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: DamageOnHit
    damage:
      types:
        Blunt: 10
  - type: MeleeWeapon
    wideAnimationRotation: 60
    damage:
      types:
        Slash: 15
    soundHit:
        path: /Audio/Weapons/bladeslice.ogg
  - type: Tag
    tags:
    - Galaxythistle
  - type: FoodSequenceElement
    entries:
      Taco: Glasstle
      Burger: GlasstleBurger

